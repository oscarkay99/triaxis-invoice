<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Invoice — TriAxis Invoice</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://script.google.com https://script.googleusercontent.com; img-src 'self' data: blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="styles/app.css" />
</head>
<body>

  <nav class="topbar">
    <div class="topbar-brand">
      <span class="brand-dot"></span>
      TRIAXIS INVOICE
    </div>
    <div class="topbar-actions">
      <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Dashboard</a>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <div class="view-layout">

      <!-- INVOICE PREVIEW -->
      <div class="invoice-preview" id="invoicePreview">
        <p style="color:var(--muted);text-align:center;padding:64px 0;">Loading…</p>
      </div>

      <!-- SIDEBAR -->
      <div>
        <div class="info-card" style="margin-bottom:16px;">
          <div class="info-card-header">Status</div>
          <div class="info-card-body">
            <div style="text-align:center;padding:8px 0;" id="statusBadgeWrap"></div>
          </div>
        </div>

        <div class="info-card" style="margin-bottom:16px;">
          <div class="info-card-header">Actions</div>
          <div class="info-card-body" style="display:flex;flex-direction:column;gap:10px;">
            <button class="btn btn-outline" id="btnPreview">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              Preview PDF
            </button>
            <button class="btn btn-navy" id="btnDownload">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download PDF
            </button>
            <button class="btn btn-outline" id="btnEmail">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Email to Client
            </button>
            <button class="btn btn-outline" id="btnEmailReceipt" style="display:none;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              Email Receipt
            </button>
            <button class="btn btn-outline" id="btnMarkPaid" style="display:none;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              Mark as Paid
            </button>
            <button class="btn btn-outline" id="btnUnmarkPaid" style="display:none;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
              Mark as Unpaid
            </button>
            <button class="btn btn-outline" id="btnReceipt" style="display:none;">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Download Receipt
            </button>
            <a href="#" class="btn btn-outline" id="btnEdit">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              Edit Invoice
            </a>
          </div>
        </div>

        <div class="info-card" id="sideInfoCard">
          <div class="info-card-header">Details</div>
          <div class="info-card-body" id="sideInfo"></div>
        </div>

        <!-- Mark paid modal inline -->
        <div id="paidPanel" style="display:none;margin-top:16px;" class="card">
          <div class="card-body">
            <div class="section-label">Mark as Paid</div>
            <div class="form-group" style="margin-bottom:12px;">
              <label>Payment Method</label>
              <select id="paymentMethod">
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Mobile Money">Mobile Money</option>
                <option value="Cash">Cash</option>
                <option value="Cheque">Cheque</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
              <label>Payment Date</label>
              <input type="date" id="paidDate" />
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-success" id="confirmPaidBtn" style="flex:1;justify-content:center;">Confirm</button>
              <button class="btn btn-outline" id="cancelPaidBtn">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/view.js"></script>
</body>
</html>
